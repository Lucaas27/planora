name: Frontend CI/CD

# Prevent concurrent deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/frontend.yml'

jobs:
  check:
    name: Check Commit Scope
    runs-on: ubuntu-latest
    outputs:
      should_run_frontend: ${{ steps.check_scope.outputs.should_run_frontend }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit scope
        id: check_scope
        if: github.event_name == 'push'
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_COMMIT_MSG" | grep -q "scope(backend)" || echo "$LAST_COMMIT_MSG" | grep -q "(backend)" || echo "$LAST_COMMIT_MSG" | grep -q "backend:"; then
            echo "This commit is for backend only, skipping frontend workflow"
            echo "should_run_frontend=false" >> $GITHUB_OUTPUT
          else
            echo "Running frontend workflow"
            echo "should_run_frontend=true" >> $GITHUB_OUTPUT
          fi
      
      # For non-push events (PRs, etc.), always run
      - name: Set default for non-push events
        if: github.event_name != 'push'
        run: echo "should_run_frontend=true" >> $GITHUB_OUTPUT
  
  build:
    name: Build & Test Frontend
    needs: check
    if: needs.check.outputs.should_run_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint
        working-directory: ./client
        run: npm run lint

      - name: Build
        working-directory: ./client
        run: npm run build

      - name: Test
        working-directory: ./client
        run: npm run test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/dist/
  
  release:
    name: Semantic Release
    needs: build
    runs-on: ubuntu-latest
    if: success() && (github.ref == 'refs/heads/main')
    outputs:
      version: ${{ steps.get_tag.outputs.new_release_version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@v4
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Get latest tag
        id: get_tag
        run: |
          # Try to get the latest tag, but use 1.0.0 as default if no tags exist yet
          VERSION=$(git describe --tags --abbrev=0 --match "frontend-v*" | sed 's/frontend-v//' || echo "1.0.0")
          echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
          echo "new_release_version=$VERSION"

      - name: Set summary
        if: ${{ steps.semantic_release.outputs.new_release_published == 'true' }}
        run: |
          echo "## Semantic Release" >> $GITHUB_STEP_SUMMARY
          echo "✅ New version published: ${{ steps.semantic_release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "Release notes: https://github.com/${{ github.repository }}/releases/tag/frontend-v${{ steps.semantic_release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY

  docker:
    name: Build and Publish Frontend Docker Image
    needs: [ build, release ]
    runs-on: ubuntu-latest
    if: success() && (github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
      pull-requests: write
    env:
      FRONTEND_IMAGE_NAME: planora-frontend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.release.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Set Docker summary
        run: |
          echo "## Frontend Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "✅ Frontend Docker image published successfully" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:sha-$(git rev-parse --short HEAD)" >> $GITHUB_STEP_SUMMARY
